name: Astro Vitest Tests(Unit)

# 워크플로우가 실행될 타이밍 정의
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 가상 환경으로 가져옴
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 환경 세팅 (현재 프로젝트 버전에 맞게 수정 가능)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm" # 의존성 캐싱으로 빌드 속도 향상

      # 3. 프로젝트 패키지 설치
      - name: Install dependencies
        run: npm ci

      # 4. Vitest and Playwright E2E 테스트 실행
      - name: Run Vitest tests
        run: npm run test:unit
